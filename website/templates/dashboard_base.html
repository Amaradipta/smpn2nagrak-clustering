<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SMPN 2 Nagrak</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
        }

        .sidebar {
            height: 100vh;
            background-color: #1e293b;
            color: white;
            position: fixed;
            width: 240px;
            top: 0;
            left: 0;
        }

        .sidebar h4 {
            padding: 20px;
            font-weight: 600;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #cbd5e1;
            text-decoration: none;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background-color: #334155;
            color: white;
        }

        .content {
            margin-left: 240px;
            padding: 30px;
            min-height: 100vh;
        }

        .card-modern {
            border: none;
            border-radius: 14px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4>Dashboard</h4>
    <a href="/analisis/upload/">Upload Analisis</a>
    <a href="#">Riwayat Analisis</a>
    <a href="/">Kembali ke Website</a>
</div>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

<!-- Bootstrap JS (WAJIB untuk collapse, dropdown, dll) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
